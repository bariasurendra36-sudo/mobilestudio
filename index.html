<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rasayan Studio - Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;600;900&family=Fira+Code:wght@400;600&display=swap');

        body {
            background-color: #000000; /* Dark background for desktop users */
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100dvh;
            overflow: hidden; /* Prevent body scroll on desktop */
        }

        /* --- THE MOBILE APP CONTAINER --- */
        #app-container {
            width: 100%;
            max-width: 430px; /* iPhone Pro Max width */
            height: 100dvh;
            background-color: #020617;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        /* Desktop borders to look like a phone */
        @media (min-width: 431px) {
            #app-container {
                height: 90vh;
                border-radius: 40px;
                border: 8px solid #1e293b;
            }
        }

        /* UI Panels */
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
        }

        .upload-zone {
            border: 2px dashed #334155;
            transition: all 0.3s ease;
            background: rgba(0,0,0,0.2);
            cursor: pointer;
        }
        .upload-zone:hover {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.05);
        }

        textarea::-webkit-scrollbar { width: 4px; }
        textarea::-webkit-scrollbar-track { background: transparent; }
        textarea::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

        /* View Management */
        .view-panel {
            display: none;
            flex-direction: column;
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            padding-bottom: 90px; /* Space for bottom nav */
        }
        .view-panel.active { display: flex; }

        /* --- 9:16 REEL PREVIEW CONTAINER --- */
        #reel-container {
            width: 100%;
            aspect-ratio: 9/16;
            background: #000;
            position: relative;
            overflow: hidden;
            border: 2px solid #1e293b;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #bgVideoPlayer {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            opacity: 0.6; 
        }

        #reel-container:fullscreen {
            border: none;
            border-radius: 0;
            background: #000;
        }
        
        #reel-container:-webkit-full-screen {
            border: none;
            border-radius: 0;
            background: #000;
        }

        .progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 4px;
            background: #3b82f6;
            z-index: 100;
            width: 0%;
        }

        /* Bottom Nav Tab Styling */
        .nav-tab { color: #64748b; transition: all 0.2s; }
        .nav-tab.active { color: #3b82f6; }
    </style>
    <style id="dynamic-styles"></style>
</head>
<body>

    <div id="app-container">
        
        <header class="p-4 border-b border-slate-800 flex items-center gap-3 bg-[#0f172a] z-50">
            <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center font-black text-white text-lg">R</div>
            <div>
                <h1 class="font-black text-lg tracking-tight text-white leading-tight">Rasayan<span class="text-blue-500">Studio</span></h1>
                <p class="text-[10px] text-slate-400 font-semibold uppercase tracking-widest">Mobile Creator</p>
            </div>
        </header>

        <main class="flex-1 overflow-hidden flex flex-col relative">

            <div id="view-setup" class="view-panel active gap-4">
                <h2 class="font-black text-xl text-white mb-2">Media Setup</h2>

                <div class="glass-panel p-4 flex flex-col">
                    <div class="flex items-center gap-2 mb-3 text-blue-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        <h3 class="text-sm font-bold text-white">1. Background</h3>
                    </div>
                    <div class="flex gap-2 w-full">
                        <label class="upload-zone rounded-xl flex-1 flex flex-col items-center justify-center p-4">
                            <input type="file" id="videoInput" accept="video/*" class="hidden">
                            <span class="font-bold text-slate-300 text-xs">Video</span>
                            <span class="text-[9px] text-slate-500 mt-1">MP4 (9:16)</span>
                        </label>
                        <div class="upload-zone rounded-xl flex-1 flex flex-col items-center justify-center p-4 relative overflow-hidden group">
                            <input type="color" id="colorInput" value="#000000" class="absolute inset-0 w-full h-[150%] -top-[25%] opacity-0 cursor-pointer">
                            <span class="font-bold text-slate-300 text-xs">Color</span>
                            <span class="text-[9px] text-slate-500 mt-1">Tap to Pick</span>
                        </div>
                    </div>
                    <div id="videoStatus" class="mt-3 text-xs text-blue-400 font-mono bg-blue-900/20 p-2 rounded hidden truncate">✓ Loaded</div>
                </div>

                <div class="glass-panel p-4 flex flex-col mt-2">
                    <div class="flex items-center justify-between mb-3 text-yellow-400">
                        <div class="flex items-center gap-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path></svg>
                            <h3 class="text-sm font-bold text-white">2. Audio (Optional)</h3>
                        </div>
                    </div>
                    <label class="upload-zone rounded-xl w-full flex flex-col items-center justify-center p-4">
                        <input type="file" id="audioInput" accept="audio/*" class="hidden">
                        <span class="font-bold text-slate-300 text-sm">Upload Audio Track</span>
                        <span class="text-[10px] text-slate-500 mt-1">MP3 or AAC</span>
                    </label>
                    <div id="audioStatus" class="mt-3 text-xs text-yellow-400 font-mono bg-yellow-900/20 p-2 rounded hidden flex justify-between">
                        <span>✓ Audio Ready</span><span id="audioDuration">0s</span>
                    </div>
                    <p class="text-[10px] text-slate-500 mt-3 text-center px-2">Duration will be calculated automatically based on your media.</p>
                </div>
            </div>

            <div id="view-code" class="view-panel h-full flex flex-col">
                <div class="flex items-center justify-between mb-3">
                    <h2 class="font-black text-xl text-white">Overlay Code</h2>
                    <button onclick="switchTab('preview')" class="bg-blue-600 text-white text-[10px] font-bold uppercase px-3 py-1.5 rounded-full tracking-wider">Run Code</button>
                </div>
                <div class="flex-1 border border-slate-700 rounded-xl overflow-hidden bg-[#0d1117] relative flex flex-col">
                    <textarea id="codeInput" class="absolute inset-0 w-full h-full text-green-400 font-mono text-[11px] p-4 outline-none resize-none bg-transparent" spellcheck="false"></textarea>
                </div>
            </div>

            <div id="view-preview" class="view-panel flex flex-col items-center h-full">
                <h2 class="font-black text-xl text-white mb-4 self-start">Live Output</h2>
                
                <div id="reel-container" class="mt-2">
                    <video id="bgVideoPlayer" muted playsinline loop crossorigin="anonymous"></video>
                    <div class="progress-bar" id="pBar"></div>
                    
                    <div id="dynamic-content" class="absolute inset-0 z-10 w-full h-full"></div>
                </div>

                <div class="flex gap-3 w-full mt-6">
                    <button id="previewBtn" class="flex-[2] bg-blue-600 hover:bg-blue-500 text-white p-4 rounded-xl font-black text-sm uppercase tracking-widest transition-transform active:scale-95 shadow-lg shadow-blue-900/50 flex items-center justify-center gap-2">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg>
                        Replay
                    </button>
                    <button id="fullscreenBtn" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white p-4 rounded-xl font-black text-sm uppercase tracking-widest transition-transform active:scale-95 shadow-lg shadow-slate-900/50 flex items-center justify-center gap-2" title="Toggle Fullscreen">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                    </button>
                </div>
            </div>

        </main>

        <nav class="absolute bottom-0 left-0 w-full bg-[#0f172a] border-t border-slate-800 flex justify-around items-center pb-[env(safe-area-inset-bottom,0px)] z-50">
            <button onclick="switchTab('setup')" id="tab-setup" class="nav-tab active flex flex-col items-center justify-center w-full py-3 gap-1">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                <span class="text-[10px] font-bold uppercase tracking-widest">Media</span>
            </button>
            <button onclick="switchTab('code')" id="tab-code" class="nav-tab flex flex-col items-center justify-center w-full py-3 gap-1">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
                <span class="text-[10px] font-bold uppercase tracking-widest">Code</span>
            </button>
            <button onclick="switchTab('preview')" id="tab-preview" class="nav-tab flex flex-col items-center justify-center w-full py-3 gap-1 relative">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132A1 1 0 0015 12z"></path></svg>
                <span class="text-[10px] font-bold uppercase tracking-widest">Preview</span>
            </button>
        </nav>
        
    </div>

    <audio id="bgAudio"></audio>

    <script>
        // --- 0. TAB MANAGEMENT ---
        function switchTab(tabId) {
            // Update UI Panels
            document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active'));
            document.getElementById('view-' + tabId).classList.add('active');
            
            // Update Bottom Nav Colors
            document.querySelectorAll('.nav-tab').forEach(t => {
                t.classList.remove('active', 'text-blue-500');
                t.classList.add('text-slate-500');
            });
            const activeTabBtn = document.getElementById('tab-' + tabId);
            activeTabBtn.classList.add('active', 'text-blue-500');
            activeTabBtn.classList.remove('text-slate-500');

            // Logic triggers
            if (tabId === 'preview') {
                startSequence();
            } else {
                // Pause media if navigating away from preview
                const bgVideoPlayer = document.getElementById('bgVideoPlayer');
                const bgAudio = document.getElementById('bgAudio');
                bgVideoPlayer.pause();
                bgAudio.pause();
                gsap.killTweensOf("*");
            }
        }

        // --- 1. DEFAULT TEMPLATE CODE ---
        const defaultTemplate = `<style>
  .caption { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; line-height: 1.1; text-shadow: 3px 3px 0px rgba(0,0,0,0.9); position: absolute; width: 90%; left: 5%; text-align: center; bottom: 15%; z-index: 50; font-size: clamp(1.2rem, 8cqw, 2.2rem); color: white; }
  .scene { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; z-index: 10; text-align: center; }
  .molecule-svg { filter: drop-shadow(0 0 15px rgba(255,255,255,0.15)); width: 85%; max-width: 250px; margin-bottom: 20%; }
</style>

<div id="captionContainer" class="caption"></div>

<div class="scene" id="scene1">
  <div class="text-[clamp(4rem,15cqw,6rem)] mb-6">🔮</div>
  <div class="text-blue-400 text-[10px] tracking-[0.5em] uppercase font-black bg-black/50 px-4 py-1 rounded-full border border-blue-900">Ancient Theory</div>
</div>

<div class="scene" id="scene2">
  <div class="text-blue-500 font-black italic text-[clamp(2rem,8cqw,3rem)] leading-[0.9] tracking-tighter">FRIEDRICH<br>WÖHLER</div>
</div>

<div class="scene" id="scene3">
  <div id="heatGlow" class="absolute inset-0 bg-orange-600/30 opacity-0 blur-xl z-0"></div>
  <div class="text-[10px] text-blue-300 mb-6 font-mono uppercase tracking-[0.2em] bg-blue-900/40 px-3 py-1 rounded border border-blue-800 backdrop-blur-sm z-10">NH₄OCN (Dead Salt)</div>
  <svg viewBox="0 0 240 120" class="molecule-svg z-10">
      <circle cx="60" cy="60" r="30" fill="#3b82f6" />
      <text x="60" y="65" text-anchor="middle" fill="white" font-weight="900" font-size="14">NH₄⁺</text>
      <g transform="translate(130, 60)">
          <rect x="0" y="-20" width="80" height="40" rx="20" fill="#ef4444" />
          <text x="40" y="5" text-anchor="middle" fill="white" font-weight="900" font-size="14">OCN⁻</text>
      </g>
  </svg>
  <div id="fireIcon" class="text-5xl opacity-0 absolute mt-12 z-0">🔥</div>
</div>

<script>
window.runReelAnimation = function(duration) {
    const mainTl = gsap.timeline();
    const d = duration;

    mainTl.to("#scene1", { opacity: 1, duration: 0.5 })
          .to("#scene1", { scale: 1.2, duration: d * 0.28 }, 0);

    mainTl.to("#scene1", { opacity: 0, scale: 2, duration: 0.5 }, d * 0.28)
          .to("#scene2", { opacity: 1, duration: 0.5 }, d * 0.28 + 0.1);

    mainTl.to("#scene2", { opacity: 0, duration: 0.5 }, d * 0.48)
          .to("#scene3", { opacity: 1, duration: 0.5 }, d * 0.48 + 0.1)
          .to("#fireIcon", { opacity: 1, scale: 1.2, duration: 0.5, repeat: -1, yoyo: true }, d * 0.52)
          .to("#heatGlow", { opacity: 1, duration: 1 }, d * 0.52);

    const scriptData = [
        { t: 0.00, text: "KYA AAPKO <span class='text-yellow-400'>PATA HAI?</span>" },
        { t: 0.10, text: "WORLD BELIEVED <br> A <span class='text-red-500'>LIE!</span>" },
        { t: 0.25, text: "LEKIN... <br> <span class='text-blue-400'>WÖHLER</span> NE" },
        { t: 0.46, text: "USSE KIYA <br> <span class='text-orange-500'>HEAT!</span>" }
    ];

    scriptData.forEach((line) => {
        gsap.delayedCall(line.t * d, () => {
            const cap = document.getElementById('captionContainer');
            if(cap) {
                cap.innerHTML = line.text;
                gsap.fromTo(cap, { y: 30, opacity: 0, scale: 0.8 }, { y: 0, opacity: 1, scale: 1, duration: 0.3, ease: "power2.out" });
            }
        });
    });
};
<\/script>`;

        // Init Textarea
        document.getElementById('codeInput').value = defaultTemplate;

        // --- 2. UPLOAD HANDLERS ---
        const videoInput = document.getElementById('videoInput');
        const colorInput = document.getElementById('colorInput');
        const bgVideoPlayer = document.getElementById('bgVideoPlayer');
        
        const audioInput = document.getElementById('audioInput');
        const bgAudio = document.getElementById('bgAudio');
        
        let audioLoaded = false;
        let globalPlaybackTimer;

        // Background Upload Logic
        colorInput.addEventListener('input', (e) => {
            const reelContainer = document.getElementById('reel-container');
            reelContainer.style.backgroundColor = e.target.value;
            bgVideoPlayer.style.display = 'none';
            bgVideoPlayer.src = ''; 
            document.getElementById('videoStatus').classList.remove('hidden');
            document.getElementById('videoStatus').innerText = `✓ Color: ${e.target.value}`;
        });

        videoInput.onchange = (e) => {
            if(e.target.files[0]) {
                const reelContainer = document.getElementById('reel-container');
                bgVideoPlayer.src = URL.createObjectURL(e.target.files[0]);
                bgVideoPlayer.style.display = 'block';
                reelContainer.style.backgroundColor = '#000000';
                document.getElementById('videoStatus').classList.remove('hidden');
                document.getElementById('videoStatus').innerText = `✓ ${e.target.files[0].name}`;
            }
        };

        // Audio Upload Logic
        audioInput.onchange = (e) => {
            if(e.target.files[0]) {
                bgAudio.src = URL.createObjectURL(e.target.files[0]);
                bgAudio.addEventListener('loadedmetadata', () => {
                    audioLoaded = true;
                    document.getElementById('audioStatus').classList.remove('hidden');
                    document.getElementById('audioDuration').innerText = `${Math.round(bgAudio.duration)}s`;
                });
            }
        };

        // --- 3. SMART CODE INJECTION SANDBOX ---
        function injectUserCode() {
            window.runReelAnimation = undefined;

            const rawCode = document.getElementById('codeInput').value;
            const parser = new DOMParser();
            const doc = parser.parseFromString(rawCode, 'text/html');

            const container = document.getElementById('reel-container');
            const cw = container.clientWidth || 360;
            const ch = container.clientHeight || 640;

            // Inject Styles
            let styles = '';
            doc.querySelectorAll('style').forEach(s => {
                let css = s.innerHTML;
                css = css.replace(/(^|\s|\}|,)(html|body)(?=\s*\{|\s*,|\s*>|\s*\+|\s*:|\s*\.)/gi, '$1#dynamic-content');
                css = css.replace(/(\d*\.?\d+)vh/gi, (m, p1) => `${(parseFloat(p1) * ch) / 100}px`);
                css = css.replace(/(\d*\.?\d+)vw/gi, (m, p1) => `${(parseFloat(p1) * cw) / 100}px`);
                styles += css + '\n';
            });
            document.getElementById('dynamic-styles').innerHTML = styles;

            // Inject HTML
            doc.querySelectorAll('script, style').forEach(el => el.remove());
            document.getElementById('dynamic-content').innerHTML = doc.body.innerHTML;

            // Inject Scripts
            let scripts = '';
            const originalScripts = parser.parseFromString(rawCode, 'text/html').querySelectorAll('script');
            originalScripts.forEach(s => scripts += s.textContent + '\n');
            
            try {
                const oldScript = document.getElementById('injected-script');
                if(oldScript) oldScript.remove();

                const scriptEl = document.createElement('script');
                scriptEl.id = 'injected-script';
                scriptEl.textContent = `
                    (function() {
                        const dynContent = document.getElementById('dynamic-content');
                        const origWinAdd = window.addEventListener;
                        window.addEventListener = function(type, listener, options) {
                            if (type === 'load' || type === 'DOMContentLoaded') { setTimeout(listener, 10); } 
                            else { origWinAdd.call(window, type, listener, options); }
                        };
                        try { ${scripts} } catch(err) { console.error("Script Error:", err); } 
                        finally { window.addEventListener = origWinAdd; }
                    })();
                `;
                document.body.appendChild(scriptEl);
            } catch(e) {
                console.error("Error evaluating script", e);
            }
        }

        // --- 4. PLAYBACK ENGINE ---
        const previewBtn = document.getElementById('previewBtn');
        const pBar = document.getElementById('pBar');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        previewBtn.onclick = () => startSequence();

        // Fullscreen Toggle Logic
        fullscreenBtn.onclick = () => {
            const container = document.getElementById('reel-container');
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                if (container.requestFullscreen) {
                    container.requestFullscreen();
                } else if (container.webkitRequestFullscreen) { /* Safari */
                    container.webkitRequestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) { /* Safari */
                    document.webkitExitFullscreen();
                }
            }
        };

        function startSequence() {
            gsap.killTweensOf("*");
            clearTimeout(globalPlaybackTimer);
            injectUserCode();
            
            if (bgVideoPlayer.src) bgVideoPlayer.currentTime = 0;
            if (audioLoaded) bgAudio.currentTime = 0;
            
            if (bgVideoPlayer.src && bgVideoPlayer.style.display !== 'none') bgVideoPlayer.play().catch(e => e);
            if (audioLoaded) bgAudio.play().catch(e => e);
            
            runTimeline();
        }

        function runTimeline() {
            // Auto Duration: Video > Audio > Default 15s
            let vidDur = (bgVideoPlayer.src && !isNaN(bgVideoPlayer.duration)) ? bgVideoPlayer.duration : 0;
            let audDur = (audioLoaded && !isNaN(bgAudio.duration)) ? bgAudio.duration : 0;
            
            let d = Math.max(vidDur, audDur);
            if (d === 0) d = 15; 
            
            gsap.fromTo(pBar, { width: '0%' }, { width: '100%', duration: d, ease: 'none' });
            
            if(typeof window.runReelAnimation === 'function') {
                window.runReelAnimation(d);
            }

            globalPlaybackTimer = setTimeout(() => {
                bgVideoPlayer.pause();
                if (audioLoaded) bgAudio.pause();
                gsap.to(pBar, { width: '0%', duration: 0.5 });
            }, d * 1000);
        }

        // Initialize first view
        switchTab('setup');
    </script>
</body>
</html>
